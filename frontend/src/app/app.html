<div class="max-w-2xl mx-auto p-8 font-sans">
  <h1 class="text-3xl font-bold mb-6 text-gray-800">Task Manager</h1>
  
  <form (ngSubmit)="createTask()" class="mb-8 space-y-4 bg-gray-50 p-4 rounded-lg shadow">
    <input required placeholder="Title" class="w-full p-2 border rounded" name="title" [(ngModel)]="newTask.title" />
    <input required placeholder="Description" class="w-full p-2 border rounded" name="description" [(ngModel)]="newTask.description" />
    
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Priority</label>
      <select class="w-full p-2 border rounded" name="priority" [(ngModel)]="newTask.priority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </div>
    
    <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">Add Task</button>
  </form>

  <div class="mb-4">
    <label class="mr-2 font-semibold text-gray-700">Filter by Priority:</label>
    <select class="p-1 border rounded" [ngModel]="filterPriority()" (ngModelChange)="filterPriority.set($event)">
      <option value="all">All</option>
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
    </select>
  </div>

  <div class="space-y-4">
    
    @for (task of filteredTasks(); track task.id) {
      <div class="p-4 border rounded-lg flex justify-between items-center shadow-sm"
           [ngClass]="task.status === 'completed' ? 'bg-green-50 opacity-70' : 'bg-white'">
        
        @if (editingId === task.id) {
          <div class="flex-1 mr-4 space-y-2">
            <input class="w-full p-1 border rounded" name="editTitle" [(ngModel)]="editTaskData.title" />
            <input class="w-full p-1 border rounded" name="editDesc" [(ngModel)]="editTaskData.description" />
            
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1">Priority</label>
              <select class="w-full p-1 border rounded" name="editPriority" [(ngModel)]="editTaskData.priority">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </div>
          </div>
        } @else {
          <div class="flex-1">
            <h3 class="font-bold text-lg" 
                [ngClass]="task.status === 'completed' ? 'line-through text-gray-500' : 'text-gray-800'">
              {{ task.title }}
            </h3>
            <p class="text-sm text-gray-600">{{ task.description }}</p>
            <span class="text-xs font-semibold bg-gray-200 px-2 py-1 rounded mt-2 inline-block">
              Priority: {{ task.priority }}
            </span>
          </div>
        }

        <div class="space-x-2 flex items-center">
          @if (editingId === task.id) {
            <button (click)="saveEdit(task.id!)" class="px-3 py-1 bg-blue-500 text-white rounded hover:bg-blue-600">Save</button>
          } @else {
            <button (click)="startEdit(task)" class="px-3 py-1 bg-gray-500 text-white rounded hover:bg-gray-600">Edit</button>
            <button (click)="toggleStatus(task)" class="px-3 py-1 bg-green-500 text-white rounded hover:bg-green-600">
              {{ task.status === 'completed' ? 'Undo' : 'Complete' }}
            </button>
            <button (click)="deleteTask(task.id!)" class="px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600">Delete</button>
          }
        </div>
      </div>
    } @empty {
      <div class="text-center p-6 bg-gray-50 rounded-lg border border-dashed border-gray-300 text-gray-500">
        No tasks found. Create one above!
      </div>
    }
  </div>
</div>
